name: java build

on:
  push:
    branches: [ master ]

env:
  DOCKERHUB_USER: antoineaumjaud
  IMAGE_NAME: antoineaumjaud/api-synology-chatbot

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout sources
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'
        cache: 'gradle'


    - name: Build and test
      run: ./gradlew clean build

    # https://github.com/docker/login-action
    - name: Log into Docker registry
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKERHUB_USER }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Build and push Docker image with Buildx (don't push on PR)
    # https://github.com/docker/build-push-action
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ env.IMAGE_NAME }}:latest

    - name: Notify Synology chat bot
      if: always() && secrets.CHATBOT_ENDPOINT != '' && secrets.CHATBOT_USER != '' && secrets.CHATBOT_WEBHOOK_SECRET != ''
      env:
        CHATBOT_ENDPOINT: ${{ secrets.CHATBOT_ENDPOINT }}
        CHATBOT_USER: ${{ secrets.CHATBOT_USER }}
        CHATBOT_WEBHOOK_SECRET: ${{ secrets.CHATBOT_WEBHOOK_SECRET }}
        REPOSITORY: ${{ github.repository }}
        WORKFLOW: ${{ github.workflow }}
        STATUS: ${{ job.status }}
        BRANCH: ${{ github.ref_name }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
      run: |
        payload=$(jq -n \
          --arg repository "$REPOSITORY" \
          --arg workflow "$WORKFLOW" \
          --arg status "$STATUS" \
          --arg branch "$BRANCH" \
          --arg url "$RUN_URL" \
          --arg message "$COMMIT_MESSAGE" \
          '{repository: $repository, workflow: $workflow, status: $status, branch: $branch, url: $url, message: $message}')

        signature=$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$CHATBOT_WEBHOOK_SECRET" | sed 's/^.* //')

        curl -fsS -X POST "$CHATBOT_ENDPOINT/send-github/$CHATBOT_USER" \
          -H "Content-Type: application/json" \
          -H "X-Hub-Signature-256: sha256=$signature" \
          --data "$payload"
